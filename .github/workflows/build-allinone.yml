name: build-allinone

# Builds the all-in-one images (Ollama + model + k8sgpt + UI baked in) and pushes
# them to Docker Hub: sokushinbutsu/k8sgpt-ui
#
# Triggers ONLY on a tag/release — a plain push to a branch does NOT build anything.
# Each tag produces TWO images, one per model. For tag "1.0.0":
#   sokushinbutsu/k8sgpt-ui:1.0.0-qwen2.5-coder-3b
#   sokushinbutsu/k8sgpt-ui:1.0.0-qwen2.5-coder-7b
# (a leading "v" in the tag is stripped, so "v1.0.0" -> "1.0.0-...")
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  -> sokushinbutsu
#   DOCKERHUB_TOKEN     -> Docker Hub access token

on:
  push:
    tags: ["*"]   # any tag triggers; branch pushes do not

env:
  IMAGE_NAME: sokushinbutsu/k8sgpt-ui

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: "qwen2.5-coder:3b"
            suffix: "qwen2.5-coder-3b"
            dockerfile: "Dockerfile.qwen2.5-coder-3b"
          - model: "qwen2.5-coder:7b"
            suffix: "qwen2.5-coder-7b"
            dockerfile: "Dockerfile.qwen2.5-coder-7b"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # the baked-in model makes a multi-GB image — free up runner disk first
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # tag name without a leading "v" -> e.g. "v1.0.0" or "1.0.0" both become "1.0.0"
      - name: Resolve version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.suffix }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.value }}-${{ matrix.suffix }}
          build-args: |
            MODEL=${{ matrix.model }}
            APP_VERSION=${{ steps.ver.outputs.value }}
            K8SGPT_VERSION=0.3.48
          provenance: false

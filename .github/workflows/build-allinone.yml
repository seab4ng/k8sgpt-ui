name: build-allinone

# Builds the single all-in-one image (Ollama + model + k8sgpt + UI baked in)
# and pushes it to Docker Hub: sokushinbutsu/k8sgpt-ui
#
# After it runs, pull + run anywhere:
#   docker pull sokushinbutsu/k8sgpt-ui:allinone
#   docker run -d -p 8080:8080 \
#     -e KUBECONFIG_B64="$(base64 -w0 ~/.kube/config)" \
#     sokushinbutsu/k8sgpt-ui:allinone
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  -> sokushinbutsu
#   DOCKERHUB_TOKEN     -> Docker Hub access token (Account Settings -> Security)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      model:
        description: "Ollama model to bake in"
        default: "qwen2.5-coder:7b"
      k8sgpt_version:
        description: "k8sgpt release version (no 'v')"
        default: "0.3.48"

env:
  IMAGE_NAME: sokushinbutsu/k8sgpt-ui

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # the baked-in model makes a ~6.5 GB image — free up runner disk first
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Clean version string for the UI: "2.0.0" on a tag (v-prefix stripped),
      # "dev-<sha>" on a normal branch push.
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # latest=auto -> "latest" is published ONLY for semver tag builds (releases),
          # never on a plain branch push.
          flavor: latest=auto
          tags: |
            type=raw,value=allinone
            type=sha,prefix=allinone-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push all-in-one
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.allinone
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODEL=${{ github.event.inputs.model || 'qwen2.5-coder:7b' }}
            K8SGPT_VERSION=${{ github.event.inputs.k8sgpt_version || '0.3.48' }}
            APP_VERSION=${{ steps.ver.outputs.value }}
          provenance: false

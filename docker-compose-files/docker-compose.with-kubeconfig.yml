# k8sgpt-ui — all-in-one WITH a bind-mounted kubeconfig.
#
# Same as docker-compose.yml, but mounts a kubeconfig file from the host so the
# cluster scan works without uploading through the UI.
#
# IMPORTANT — the path must point at an EXISTING FILE, or Docker will create an
# empty *directory* there and the scan will fail. Two ways to set it:
#
#   1. Easiest (cross-platform): put your kubeconfig file next to this file,
#      named exactly `kubeconfig`, then:
#         docker compose -f docker-compose.with-kubeconfig.yml up -d
#
#   2. Point at any path via the KUBECONFIG_HOST variable:
#         Linux/macOS:  KUBECONFIG_HOST=$HOME/.kube/config docker compose -f docker-compose.with-kubeconfig.yml up -d
#         Windows (PowerShell):  $env:KUBECONFIG_HOST="$env:USERPROFILE\.kube\config"; docker compose -f docker-compose.with-kubeconfig.yml up -d
#         Windows (cmd):  set KUBECONFIG_HOST=%USERPROFILE%\.kube\config && docker compose -f docker-compose.with-kubeconfig.yml up -d
#
# GKE NOTE: a kubeconfig that uses the `gke-gcloud-auth-plugin` exec auth will NOT
# work inside the container (no gcloud there). Use a static/token-based kubeconfig,
# or just upload through the UI instead.

name: k8sgpt-ui

services:
  k8sgpt-ui:
    image: ${K8SGPT_UI_IMAGE:-sokushinbutsu/k8sgpt-ui:latest}
    container_name: k8sgpt-ui
    ports:
      - "8080:8080"
    environment:
      KUBECONFIG: "/root/.kube/config"
      MODEL: "qwen2.5-coder:7b"
      OLLAMA_URL: "http://localhost:11434"
      STREAMLIT_SERVER_ENABLE_CORS: "false"
      STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "false"
      STREAMLIT_SERVER_ENABLE_WEBSOCKET_COMPRESSION: "false"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_CTX: "8192"
    volumes:
      - ${KUBECONFIG_HOST:-./kubeconfig}:/root/.kube/config:ro
    restart: unless-stopped

    # cpus: 8
    # mem_limit: 12g
